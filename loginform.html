<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login form Task</title>
</head>
<body>
    <blockquote>
    <h2>Student Registration Form</h2>
    <form>
        <label>Username:</label>
        <br>
        <input type="text">
        <br>
        <label>Password</label>
        <br>
         <input type="password">
         <br>
        <label>Email:</label>
        <br>
         <input type="Email">
         <br>
        <label>Phone Number:</label>
        <br>
         <input type="tel">
         <br>
        <label>Website URL:</label>
        <br>
         <input type="url">
         <br>
         <label>AGE:</label>
         <br>
         <input type="number">
         <br>
         <label>Date of Birth:</label>
         <br>
         <br>
         <input type="date">
         <br>
         <br>
         <label>Search:</label>
         <br>
         <input type="search">
         <br>
         <br>
         <label>UploadFile:</label>
         <br>
         <input type="file">
         <br>
         <br>
         <label>Choose color:</label>
         <br>
         <input type="color">
         <br>
         <br>
         <label>Range:</label>
          <br>
         <input type="range">
          <br>
           <br>
         <label>Gender:</label>
          <br>
         <input type="radio" name="Gender">
         Male
         <input type="radio" name="Gender">
         Female
          <br>
          <br>
         <label>Skils:</label>
          <br>
         <input type="checkbox">
         HTML
         <input type="checkbox">
         CSS
         <input type="checkbox">
         Python
          <br>
          <br>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
    </form> 
    </blockquote>  
</body>
</html>
